<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f2e9;
    --ink:#1d1a16;
    --ink-soft:#6b6459;
    --line:#d9d1c2;
    --tile:#efe9dc;
    --tile-press:#e3dccb;
    /* Difficulté : du plus simple au plus retors */
    --c1:#e7c75b;  /* jaune  – facile     */
    --c2:#9aab6a;  /* vert   – moyen      */
    --c3:#6e96c4;  /* bleu   – difficile  */
    --c4:#9b7bb3;  /* violet – coriace    */
    --ink-on:#1d1a16;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--paper);color:var(--ink);}
  body{
    font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 48px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:520px;}

  header{text-align:center;margin-bottom:18px;}
  .eyebrow{
    font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--ink-soft);margin:0 0 6px;font-weight:700;
  }
  h1{
    font-family:"Fraunces",Georgia,"Times New Roman",serif;
    font-weight:900;font-size:clamp(40px,12vw,60px);line-height:.9;
    margin:0;letter-spacing:-.01em;font-optical-sizing:auto;
  }
  .sub{margin:8px 0 0;color:var(--ink-soft);font-size:14px;}
  .rule{height:2px;background:var(--ink);width:46px;margin:14px auto 0;}

  .board{display:flex;flex-direction:column;gap:8px;margin-top:22px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}

  .tile{
    appearance:none;border:none;cursor:pointer;
    background:var(--tile);color:var(--ink);
    border-radius:9px;
    aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:4px;
    font-weight:700;font-size:clamp(11px,3.6vw,16px);
    text-transform:uppercase;letter-spacing:.01em;line-height:1.05;
    transition:transform .12s ease, background .12s ease, color .12s ease;
    user-select:none;
  }
  .tile:hover{background:var(--tile-press);}
  .tile:active{transform:scale(.95);}
  .tile.sel{background:var(--ink);color:var(--paper);}
  .tile:focus-visible{outline:3px solid var(--c3);outline-offset:2px;}
  .tile.shake{animation:shake .42s ease;}
  .tile.pop{animation:pop .3s ease;}
  @keyframes shake{
    10%,90%{transform:translateX(-1px);}
    20%,80%{transform:translateX(2px);}
    30%,50%,70%{transform:translateX(-4px);}
    40%,60%{transform:translateX(4px);}
  }
  @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.06);}100%{transform:scale(1);}}

  /* Rangée résolue */
  .solved{
    border-radius:9px;padding:12px 14px;color:var(--ink-on);
    display:flex;flex-direction:column;gap:2px;
    animation:reveal .45s ease;
  }
  .solved .cat{font-weight:900;text-transform:uppercase;letter-spacing:.06em;font-size:14px;}
  .solved .members{font-weight:500;font-size:13px;opacity:.82;}
  .lvl1{background:var(--c1);} .lvl2{background:var(--c2);}
  .lvl3{background:var(--c3);} .lvl4{background:var(--c4);}
  @keyframes reveal{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}

  .lives{display:flex;align-items:center;justify-content:center;gap:10px;margin:22px 0 4px;
    color:var(--ink-soft);font-size:13px;}
  .dots{display:flex;gap:8px;}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--ink);
    transition:transform .25s ease, background .25s ease;}
  .dot.gone{background:var(--line);transform:scale(.78);}

  .controls{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
  .btn{
    appearance:none;cursor:pointer;
    background:transparent;color:var(--ink);
    border:1.6px solid var(--ink);border-radius:999px;
    padding:11px 20px;font-family:inherit;font-weight:700;font-size:14px;
    transition:background .12s, color .12s, opacity .12s, transform .1s;
  }
  .btn:hover:not(:disabled){background:var(--ink);color:var(--paper);}
  .btn:active:not(:disabled){transform:scale(.97);}
  .btn:disabled{opacity:.32;cursor:not-allowed;}
  .btn.primary{background:var(--ink);color:var(--paper);}
  .btn.primary:hover:not(:disabled){opacity:.85;}
  .btn:focus-visible{outline:3px solid var(--c3);outline-offset:2px;}

  .toast{
    text-align:center;min-height:22px;margin-top:14px;
    font-weight:700;font-size:14px;color:var(--ink);
    opacity:0;transition:opacity .2s;
  }
  .toast.show{opacity:1;}

  .endcard{
    text-align:center;margin-top:18px;padding:20px;border:2px solid var(--ink);
    border-radius:12px;animation:reveal .4s ease;
  }
  .endcard h2{font-family:"Fraunces",serif;font-weight:900;margin:0 0 6px;font-size:26px;}
  .endcard p{margin:0;color:var(--ink-soft);font-size:14px;}

  footer{margin-top:26px;color:var(--ink-soft);font-size:12px;text-align:center;}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">La grille du jour</p>
    <h1>Connexions</h1>
    <p class="sub">Réunis les seize mots en quatre groupes de quatre.</p>
    <div class="rule"></div>
  </header>

  <div id="board" class="board"></div>

  <div class="lives">
    <span>Essais&nbsp;restants</span>
    <div id="dots" class="dots"></div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="controls">
    <button class="btn" id="shuffle">Mélanger</button>
    <button class="btn" id="deselect" disabled>Désélectionner</button>
    <button class="btn primary" id="submit" disabled>Valider</button>
  </div>

  <div id="end"></div>

  <footer>Une grille pour Christian.</footer>
</div>

<script>
/* ============================================================
   LA GRILLE  —  modifie uniquement ce bloc pour créer la tienne.
   - level : 1 (facile, jaune) … 4 (coriace, violet)
   - chaque catégorie doit avoir EXACTEMENT 4 membres.
   ============================================================ */
const PUZZLE = [
  {
    level: 1,
    cat: "Fromages français",
    members: ["BRIE", "COMTÉ", "CANTAL", "REBLOCHON"]
  },
  {
    level: 2,
    cat: "Animaux de la ferme",
    members: ["VACHE", "MOUTON", "POULE", "CHÈVRE"]
  },
  {
    level: 3,
    cat: "Presse",
    members: ["GAZETTE", "JOURNAL", "MAGAZINE", "REVUE"]
  },
  {
    level: 4,
    cat: "___ de poche",
    members: ["COUTEAU", "LAMPE", "LIVRE", "ARGENT"]
  }
];
const MAX_MISTAKES = 4;
/* ============================================================ */

const boardEl = document.getElementById("board");
const dotsEl  = document.getElementById("dots");
const toastEl = document.getElementById("toast");
const endEl   = document.getElementById("end");
const submitBtn   = document.getElementById("submit");
const deselectBtn = document.getElementById("deselect");
const shuffleBtn  = document.getElementById("shuffle");

let tiles = [];        
let selected = [];     
let solvedLevels = []; 
let mistakes = 0;
let locked = false;

const lookup = {};     
PUZZLE.forEach(g => g.members.forEach(w => lookup[w] = g.level));
const catByLevel = {};
PUZZLE.forEach(g => catByLevel[g.level] = g);

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init(){
  tiles = [];
  PUZZLE.forEach(g => g.members.forEach(w => tiles.push({word:w, level:g.level})));
  shuffle(tiles);
  selected = [];
  solvedLevels = [];
  mistakes = 0;
  locked = false;
  endEl.innerHTML = "";
  render();
}

function render(){
  boardEl.innerHTML = "";

  solvedLevels
    .slice()
    .sort((a,b)=>a-b)
    .forEach(lvl=>{
      const g = catByLevel[lvl];
      const row = document.createElement("div");
      row.className = `solved lvl${lvl}`;
      row.innerHTML = `<span class="cat">${g.cat}</span>
        <span class="members">${g.members.join(" · ")}</span>`;
      boardEl.appendChild(row);
    });

  for(let i=0;i<tiles.length;i+=4){
    const row = document.createElement("div");
    row.className = "row";
    tiles.slice(i,i+4).forEach(t=>{
      const b = document.createElement("button");
      b.className = "tile" + (selected.includes(t.word) ? " sel" : "");
      b.textContent = t.word;
      b.setAttribute("aria-pressed", selected.includes(t.word));
      b.onclick = ()=>toggle(t.word, b);
      row.appendChild(b);
    });
    boardEl.appendChild(row);
  }

  dotsEl.innerHTML = "";
  for(let i=0;i<MAX_MISTAKES;i++){
    const d = document.createElement("span");
    d.className = "dot" + (i < mistakes ? " gone" : "");
    dotsEl.appendChild(d);
  }

  updateButtons();
}

function toggle(word, el){
  if(locked) return;
  const i = selected.indexOf(word);
  if(i > -1){
    selected.splice(i,1);
  } else {
    if(selected.length >= 4) return;
    selected.push(word);
    el.classList.add("pop");
    setTimeout(()=>el.classList.remove("pop"),300);
  }
  render();
}

function updateButtons(){
  submitBtn.disabled   = selected.length !== 4 || locked;
  deselectBtn.disabled = selected.length === 0 || locked;
}

function flash(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(flash._t);
  flash._t = setTimeout(()=>toastEl.classList.remove("show"), 1800);
}

function submit(){
  if(selected.length !== 4) return;
  const levels = selected.map(w => lookup[w]);
  const counts = {};
  levels.forEach(l => counts[l] = (counts[l]||0)+1);
  const max = Math.max(...Object.values(counts));

  if(max === 4){
    const lvl = levels[0];
    solvedLevels.push(lvl);
    tiles = tiles.filter(t => !selected.includes(t.word));
    selected = [];
    flash(praise(lvl));
    render();
    if(solvedLevels.length === PUZZLE.length) win();
    return;
  }

  mistakes++;
  const sels = [...document.querySelectorAll(".tile.sel")];
  sels.forEach(el=>el.classList.add("shake"));
  setTimeout(()=>sels.forEach(el=>el.classList.remove("shake")),420);

  if(max === 3){
    flash("Presque… un mot de trop.");
  } else {
    flash("Raté.");
  }
  render();
  if(mistakes >= MAX_MISTAKES) lose();
}

function praise(lvl){
  return ["Impeccable.","Bien vu.","Joli.","Le plus coriace, chapeau !"][lvl-1] || "Bien vu.";
}

function deselect(){
  selected = [];
  render();
}

function win(){
  locked = true;
  const tries = mistakes;
  const msg = tries === 0
    ? "Sans la moindre faute. Magistral."
    : `En ${MAX_MISTAKES - tries} essai${MAX_MISTAKES-tries>1?"s":""} de marge. Bien joué.`;
  showEnd("Gagné", msg);
}

function lose(){
  locked = true;
  const remaining = PUZZLE.filter(g => !solvedLevels.includes(g.level)).map(g=>g.level);
  remaining.forEach(l => solvedLevels.push(l));
  tiles = [];
  selected = [];
  render();
  showEnd("Perdu", "Voici la solution complète. À retenter.");
}

function showEnd(title, text){
  endEl.innerHTML = `
    <div class="endcard">
      <h2>${title}</h2>
      <p>${text}</p>
      <div class="controls" style="margin-top:16px;">
        <button class="btn primary" id="again">Rejouer</button>
      </div>
    </div>`;
  document.getElementById("again").onclick = init;
}

submitBtn.onclick   = submit;
deselectBtn.onclick = deselect;
shuffleBtn.onclick  = ()=>{ if(!locked){ shuffle(tiles); render(); } };

document.addEventListener("keydown", e=>{
  if(e.key === "Enter" && !submitBtn.disabled) submit();
});

init();
</script>
</body>
</html>
